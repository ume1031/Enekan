<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>エネ管 暗記デッキ</title>
<meta name="theme-color" content="#1f3a5f">
<link rel="manifest" href="./manifest.webmanifest">
<link rel="apple-touch-icon" href="./icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="エネ管暗記">
<style>
  :root{
    --navy:#1f3a5f; --good:#0f9d58; --hard:#d99413; --again:#cf4b46;
    --I:#b07d12; --Isoft:#fdf3e1; --II:#1f6fb2; --IIsoft:#e9f2fb;
    --III:#6d3fc4; --IIIsoft:#f0eafb; --IV:#0e8a7d; --IVsoft:#e4f5f1;
    --bg:#f4f5f3; --ink:#1f2d3d; --mut:#6b7886; --line:#e6e9ec;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);
    font-family:"Hiragino Sans","Hiragino Kaku Gothic ProN","Noto Sans JP","Yu Gothic UI","Yu Gothic",system-ui,sans-serif;
    -webkit-text-size-adjust:100%;padding-top:env(safe-area-inset-top)}
  #app{max-width:760px;margin:0 auto;padding:16px 16px 72px}
  button{font-family:inherit}
  .hd{display:flex;align-items:center;gap:10px;margin-bottom:14px}
  .logo{width:34px;height:34px;border-radius:9px;background:var(--navy);display:grid;place-items:center;color:#fff;font-size:18px}
  .title{font-weight:800;font-size:17px;letter-spacing:.02em}
  .sub{font-size:11.5px;color:var(--mut)}
  .back{background:#fff;border:1px solid var(--line);border-radius:9px;width:36px;height:36px;display:grid;place-items:center;cursor:pointer;color:var(--navy);font-size:20px}
  .save-dot{margin-left:auto;display:flex;align-items:center;gap:6px;font-size:11px}
  .dot{width:8px;height:8px;border-radius:99px;background:var(--good)}

  .hero{background:var(--navy);color:#fff;border-radius:16px;padding:18px;margin-bottom:12px}
  .hero .lab{font-size:12.5px;opacity:.85;font-weight:600}
  .hero .num{font-size:40px;font-weight:800;line-height:1}
  .btn{border:none;border-radius:12px;padding:13px 14px;font-weight:700;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;width:100%}
  .btn-light{background:#fff;color:var(--navy)}
  .btn-navy{background:var(--navy);color:#fff}
  .btn-soft{background:#eef1f4;color:var(--navy)}
  .split{display:flex;gap:14px;margin:4px 0 12px}
  .split .it{font-size:13px;opacity:.92}
  .split .it b{font-size:20px;font-weight:800}

  .overall{background:#fff;border:1px solid var(--line);border-radius:14px;padding:13px 14px;margin-bottom:12px}
  .overall .t{display:flex;align-items:baseline;gap:8px;font-size:13px;color:var(--mut)}
  .overall .t b{font-size:18px;color:var(--good);font-weight:800}
  .obar{height:7px;background:#eef1f4;border-radius:99px;margin-top:8px;overflow:hidden}
  .obar > div{height:100%;background:var(--good)}

  .modeseg{display:flex;gap:6px;background:#e9ecef;padding:4px;border-radius:12px;margin-bottom:14px}
  .modebtn{flex:1;border:none;background:transparent;border-radius:9px;padding:9px;font-weight:700;font-size:13.5px;color:#6b7886;cursor:pointer}
  .modebtn.on{background:#fff;color:var(--navy);box-shadow:0 1px 2px rgba(20,40,70,.08)}

  .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .scard{background:#fff;border-radius:14px;padding:13px;border:1px solid var(--line)}
  .chip{font-size:12px;font-weight:700;padding:2px 8px;border-radius:999px;white-space:nowrap;display:inline-block}
  .sname{font-size:12.5px;color:#5b6877;margin:4px 0 8px;min-height:16px}
  .obar2{height:5px;background:#eef1f4;border-radius:99px;margin:6px 0 9px;overflow:hidden}
  .obar2 > div{height:100%;background:var(--good)}
  .smbtn{border:none;border-radius:9px;padding:9px 8px;font-weight:700;font-size:12.5px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px}
  .row{display:flex;gap:6px}
  .footbtns{display:flex;gap:10px;margin-top:14px}
  .rowbtn{flex:1;background:#fff;border:1px solid var(--line);border-radius:12px;padding:13px;font-weight:700;font-size:14px;color:var(--navy);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}

  .meter{display:inline-flex;gap:3px;align-items:center}
  .mdot{width:8px;height:8px;border-radius:99px;background:#d9dee5}
  .mdot.on{background:var(--good)}
  .stat{font-size:10.5px;font-weight:700;padding:2px 7px;border-radius:999px}

  .revmeta{display:flex;align-items:center;gap:8px;margin-bottom:8px;font-size:12px;color:#7a8794}
  .barwrap{height:5px;background:#e7eaed;border-radius:99px;overflow:hidden}
  .bar{height:100%}
  .qcard{background:#fff;border:1px solid #e3e7eb;border-radius:16px;padding:22px 20px;box-shadow:0 1px 2px rgba(20,40,70,.05)}
  .face{width:100%;text-align:left;background:#fff;border:1px solid #e3e7eb;border-radius:16px;padding:22px 20px;cursor:pointer;min-height:230px;display:flex;flex-direction:column;box-shadow:0 1px 2px rgba(20,40,70,.05)}
  .qtext{font-size:19px;font-weight:700;line-height:1.5}
  .hint{margin-top:auto;padding-top:18px;font-size:12.5px;color:#9aa6b2}
  .ans{margin-top:16px;padding-top:16px;border-top:1px dashed #d7dde3}
  .ans .l{font-size:11px;font-weight:700;margin-bottom:6px}
  .ans .t{font-size:17px;line-height:1.65;color:#243240}
  .grades{display:flex;gap:8px;margin-top:12px}
  .gbtn{flex:1;background:#fff;border-radius:13px;padding:12px 6px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;font-weight:700;border-width:1.5px;border-style:solid}
  .gbtn .ic{font-size:18px;line-height:1}
  .gbtn .lb{font-size:14px}
  .gbtn .sb{font-size:10.5px;opacity:.85;font-weight:600}
  .opts{display:flex;flex-direction:column;gap:8px;margin-top:12px}
  .opt{width:100%;text-align:left;background:#fff;border:1.5px solid #e3e7eb;border-radius:12px;padding:12px 14px;font-size:14.5px;line-height:1.5;cursor:pointer;color:#243240;font-family:inherit}
  .opt.correct{border-color:var(--good);background:#eaf6ef}
  .opt.wrong{border-color:var(--again);background:#fbecec}
  .opt.dim{opacity:.5}
  .result{margin-top:14px;text-align:center}

  .done{background:#fff;border-radius:16px;padding:26px;text-align:center;border:1px solid var(--line)}
  .done .circle{width:56px;height:56px;border-radius:99px;background:#e8f6ee;display:grid;place-items:center;margin:0 auto 12px;color:var(--good);font-size:28px}

  .searchbar{flex:1;display:flex;align-items:center;gap:7px;background:#fff;border:1px solid #e3e7eb;border-radius:11px;padding:8px 11px}
  .searchbar input{border:none;outline:none;flex:1;font-size:14px;background:transparent;font-family:inherit}
  .filters{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
  .fchip{font-size:12.5px;font-weight:700;padding:6px 11px;border-radius:999px;cursor:pointer;border:1px solid #dde2e7;background:#fff;color:#5b6877}
  .clist{display:flex;flex-direction:column;gap:8px}
  .crow{background:#fff;border:1px solid var(--line);border-radius:11px;padding:11px 13px}
  .crow .top{display:flex;align-items:center;gap:7px;margin-bottom:5px}
  .crow .topic{font-size:11px;color:#9aa6b2}
  .crow .q{font-size:14.5px;font-weight:600;line-height:1.45}
  .crow .a{font-size:13px;color:#54616e;line-height:1.55;margin-top:3px}
  .miniic{background:transparent;border:none;cursor:pointer;padding:4px;font-size:14px;line-height:1}

  .panel{background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px}
  label.lbl{display:block;font-size:12px;font-weight:700;color:var(--mut);margin:0 0 5px}
  .inp,.ta{width:100%;border:1px solid #dde2e7;border-radius:9px;padding:9px 11px;font-size:14px;margin-bottom:12px;outline:none;font-family:inherit}
  .ta{resize:vertical;line-height:1.5}
  .subbtns{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
  .subbtn{font-size:13px;font-weight:700;padding:7px 12px;border-radius:9px;cursor:pointer;border:1px solid #dde2e7;background:#fff;color:#5b6877}

  .setrow{background:#fff;border:1px solid var(--line);border-radius:12px;padding:14px;display:flex;align-items:center;gap:12px}
  .setrow .ic{font-size:18px}
  .setrow .ti{font-weight:700;font-size:14px}
  .setrow .de{font-size:12px;color:#8a96a3;line-height:1.4}
  .note{background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px}
  .note h4{margin:0 0 6px;font-size:15px}
  .note ul{margin:0;padding-left:18px;font-size:13px;color:#54616e;line-height:1.7}
  .stack{display:flex;flex-direction:column;gap:12px}
  .numctl{display:flex;align-items:center;gap:10px}
  .numbtn{width:38px;height:38px;border-radius:9px;border:1px solid #dde2e7;background:#fff;font-size:20px;font-weight:700;color:var(--navy);cursor:pointer}
  .numval{font-size:20px;font-weight:800;min-width:42px;text-align:center}
</style>
</head>

<script>
/* セーフティネット：エラーや空白を白画面のままにせず、原因を画面に表示する */
(function(){
  function show(msg){
    var a=document.getElementById('app');
    if(a && !a.innerHTML.trim()){
      a.innerHTML='<div style="max-width:680px;margin:24px auto;padding:18px;border:1px solid #e6c9c9;background:#fff;border-radius:12px;'
        +'font-family:-apple-system,sans-serif;color:#1f2d3d;line-height:1.7">'
        +'<div style="font-weight:800;color:#cf4b46;margin-bottom:6px">読み込みに失敗しました</div>'
        +'<div style="font-size:13px;white-space:pre-wrap;background:#f7f7f5;padding:8px;border-radius:8px;margin:8px 0">'+msg+'</div>'
        +'<div style="font-size:13px">考えられる原因：index.html が途中で切れている／文字化け。'
        +'<b>「Add file → Upload files」で index.html をアップロードして入れ直す</b>のが確実です（コピペは切れやすい）。</div>'
        +'<div style="font-size:12px;color:#888;margin-top:8px">データ（暗記カードと進捗）は端末内に残っているので、入れ直しても消えません。</div></div>';
    }
  }
  window.addEventListener('error', function(e){ show((e&&e.message)?e.message:'不明なエラー'); });
  window.addEventListener('load', function(){ setTimeout(function(){ show('画面が描画されませんでした（スクリプトが途中で止まった可能性）。'); }, 900); });
})();
</script>
<script>
/* ====================================================================
   エネ管 暗記デッキ v3 — エビデンスに基づく間隔反復エンジン
   定着判定＝「日をまたいだ自力正解 3回」(Karpicke & Roediger 2008 /
   Rawson & Dunlosky 2011：成功想起は約3回で漸近)。
   間隔 1→4→9日（初回を遅らせ、同日のやり直しは定着回数に数えない）。
   ==================================================================== */
const STORE_KEY="enekan_anki_v1";
const META_KEY ="enekan_meta_v1";

const SUBJECTS={
  I:  {label:"課目I",  name:"総合管理・法規", color:"var(--I)",  soft:"var(--Isoft)"},
  II: {label:"課目II", name:"電気の基礎",     color:"var(--II)", soft:"var(--IIsoft)"},
  III:{label:"課目III",name:"設備・機器",     color:"var(--III)",soft:"var(--IIIsoft)"},
  IV: {label:"課目IV", name:"電力応用",       color:"var(--IV)", soft:"var(--IVsoft)"},
};
const ORDER=["I","II","III","IV"];

/* 学習パラメータ（エビデンス由来） */
const CRITERION=3;          // 定着＝間隔をあけた正解3回
const STEP=[1,4,9];         // succ 1,2,3 到達時の次回間隔(日)。初回を遅らせ緩く拡張
const EASE0=2.3, EASE_MIN=1.3, MAXIV=30; // 定着後の維持間隔の上限(日)＝試験6週間に最適化
const DEFAULT_NEW=20;       // 1日に投入する新規カードの上限（変更可）

const SEED=[
  ["I-01","I","省エネ法","省エネ法の正式名称（2023年改正後）は？","エネルギーの使用の合理化及び非化石エネルギーへの転換等に関する法律"],

  ["I-03","I","指定区分","「特定事業者」の指定基準は？","事業者全体の年間エネルギー使用量が原油換算 1,500 kL/年度 以上"],

  ["I-08","I","選任","エネルギー管理統括者を実務で補佐する者は？","エネルギー管理企画推進者（エネルギー管理士免状の所有者または研修修了者）"],

  ["I-15","I","制度","ベンチマーク制度とは？","業種ごとに定めた目標水準と各社の省エネ状況を比較・評価する制度"],

  ["I-17","I","換算","原油換算係数（標準）は？","1 kL（原油）= 38.2 GJ（= 0.0258 kL/GJ）"],

  ["I-29","I","時事","発電電力量に占める再エネ比率は？","約 22.9%（2023年度）。※要確認"],
  ["I-30","I","時事","第7次エネルギー基本計画の再エネ目標は？","2030年度に再エネ 36〜38%。2040年度見通しで再エネ4〜5割・自給率3〜4割"],
  ["I-31","I","基礎","カーボンニュートラルの定義は？","温室効果ガスの排出量と吸収・除去量を均衡させ、実質ゼロにすること"],
  ["I-32","I","法令・第5条 判断の基準","法第5条 判断の基準で、合理化の目標達成のために『取り組むべき措置』にかかる語。自主的か計画的か","計画的（に取り組むべき措置）。『自主的』ではない点に注意。"],

  ["IV-51","IV","照明","白熱電球ソケットに付く最高効率ランプとその特性は？","電球形LED。約115lm/W、立上りは非常に速い"],

  ["IV-54","IV","照明","円光源を点光源として逆二乗則で照度を出せる条件は？","光源までの距離が円光源直径の5倍以上あれば誤差1%以内に収まる"],
  ["IV-55","IV","照明","ランバート（均等拡散）面の輝度Lと光束発散度Mの関係は？","M＝πL（片面発光）。※球の÷4πではない。ここを間違えやすい"],
  ["IV-56","IV","照明","室指数Kの式と高さHの取り方は？","K＝XY/(H(X＋Y))。X,Y＝間口・奥行き、H＝器具取付高−作業面高（天井高そのものではない）"],

];

/* ---------- 日付（テスト用に上書き可能） ---------- */
let NOW=null;
function today(){const d=NOW?new Date(NOW+"T00:00:00"):new Date();d.setHours(0,0,0,0);
  return new Date(d-d.getTimezoneOffset()*60000).toISOString().slice(0,10);}
function addDays(n){const d=NOW?new Date(NOW+"T00:00:00"):new Date();d.setHours(0,0,0,0);d.setDate(d.getDate()+n);
  return new Date(d-d.getTimezoneOffset()*60000).toISOString().slice(0,10);}
try{ window.__setToday=function(s){NOW=s;}; }catch(e){}

const isNew=(c)=> c.succ===0 && c.seen===0 && c.intro==null;
const isDue=(c)=> !isNew(c) && (c.due==null || c.due<=today());
const statusOf=(c)=> c.succ>=CRITERION ? "done" : (isNew(c) ? "new" : "learning");

const VALIDSUB=["I","II","III","IV"];
/* 起動時の自己防衛：不正な科目を補正・重複を除去・壊れた行を捨てる */
function sanitize(cards){
  const seen=new Set(); const out=[];
  for(const c of (cards||[])){
    if(!c||typeof c.id!=="string"||typeof c.front!=="string"||typeof c.back!=="string")continue;
    let sub=String(c.subject||"").replace(/^課目\s*/,"").trim();
    if(!VALIDSUB.includes(sub))continue;
    c.subject=sub;
    const key=String(c.front).replace(/\s+/g," ").trim().toLowerCase();
    if(!key||seen.has(key))continue;
    seen.add(key);
    out.push(c);
  }
  return out;
}
function freshCard(row){const [id,subject,topic,front,back]=row;
  return {id,subject,topic,front,back,succ:0,reps:0,ease:EASE0,interval:0,due:null,last:null,dayFail:null,lapses:0,seen:0,intro:null};}
function seedDeck(){return sanitize(SEED.map(freshCard));}

/* 旧データ {box,due,seen} → 新スキーマへ移行（進捗を概ね引き継ぐ） */
function migrate(c){
  if(c.succ!==undefined && c.interval!==undefined && c.ease!==undefined) return c;
  const box=c.box||1;
  const succ=Math.min(CRITERION, Math.max(0, box-1));
  const interval = succ===0?0:(STEP[Math.min(succ,STEP.length)-1]);
  const studied=(c.seen||0)>0 || box>1;
  return {id:c.id,subject:c.subject,topic:c.topic,front:c.front,back:c.back,
    succ, reps:succ, ease:EASE0, interval, due:c.due||null, last:null, dayFail:null,
    lapses:0, seen:c.seen||0, intro:(studied? "2000-01-01":null)};
}

/* ---------- 永続化 ---------- */
let saveOK=true;
function load(){try{const r=localStorage.getItem(STORE_KEY);if(r)return sanitize(JSON.parse(r).map(migrate));}catch(e){}return seedDeck();}
function save(){try{localStorage.setItem(STORE_KEY,JSON.stringify(deck));saveOK=true;}catch(e){saveOK=false;}}
function loadMeta(){try{const r=localStorage.getItem(META_KEY);if(r)return JSON.parse(r);}catch(e){}return {newPerDay:DEFAULT_NEW};}
function saveMeta(){try{localStorage.setItem(META_KEY,JSON.stringify(meta));}catch(e){}}

let deck=load(); let meta=loadMeta();
let savedMode="choice"; try{const mm=localStorage.getItem("enekan_mode"); if(mm)savedMode=mm;}catch(e){}
let st={view:"home",mode:savedMode,queue:[],pos:0,flipped:false,options:null,answered:null,correct:null,
  drill:false, stats:{good:0,again:0,grad:0}, filterSub:"all",search:"",editing:null,editSub:"I",confirm:null};

/* ---------- 集計 ---------- */
function introducedToday(){return deck.filter(c=>c.intro===today()).length;}
function newRemaining(){return Math.max(0, meta.newPerDay - introducedToday());}
function counts(){
  const c={}; ORDER.forEach(s=>c[s]={total:0,done:0,due:0,newAvail:0});
  for(const card of deck){const b=c[card.subject];if(!b)continue;b.total++;
    const s=statusOf(card);
    if(s==="done")b.done++;
    if(s==="new")b.newAvail++;
    else if(isDue(card))b.due++;
  }
  const sum=k=>ORDER.reduce((a,s)=>a+c[s][k],0);
  return {c,total:deck.length,done:sum("done"),due:sum("due"),newAvail:sum("newAvail")};
}
const inScope=(c,sc)=> sc==="all"||c.subject===sc;

/* ---------- セッション ---------- */
function shuffle(a){a=[...a];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function startDaily(scope){
  const reviews=deck.filter(c=>isDue(c)&&inScope(c,scope));
  const newsAll=deck.filter(c=>isNew(c)&&inScope(c,scope));
  const news=newsAll.slice(0, newRemaining());
  begin(reviews.concat(news).map(c=>c.id), false);
}
function startDrill(scope){ begin(deck.filter(c=>inScope(c,scope)).map(c=>c.id), true); }
function begin(ids,drill){
  st.queue=shuffle(ids);st.pos=0;st.flipped=false;st.options=null;st.answered=null;st.correct=null;
  st.stats={good:0,again:0,grad:0};st.drill=!!drill;st.view="review";render();
}
function currentCard(){return st.pos<st.queue.length?deck.find(c=>c.id===st.queue[st.pos]):null;}

function makeOptions(card){
  const pool=deck.filter(c=>c.id!==card.id);
  const seen=new Set([card.back]);const pick=[];
  const add=(list)=>{for(const c of shuffle(list)){if(pick.length>=3)break;if(!seen.has(c.back)){seen.add(c.back);pick.push(c.back);}}};
  add(pool.filter(c=>c.subject===card.subject&&c.topic===card.topic));
  add(pool.filter(c=>c.subject===card.subject));
  add(pool);
  return shuffle([card.back,...pick]);
}

/* 採点エンジン：q = good | hard | again */
function applyGrade(card,q){
  if(st.drill){ card.seen++; return {lapsed:q==="again"}; } // ドリルは進捗を変えない（純粋な追い込み）
  const t=today();
  card.seen++;
  if(card.intro==null)card.intro=t;
  if(q==="again"){
    card.lapses++; card.reps=0; card.dayFail=t;
    card.succ=Math.max(0,card.succ-1);
    card.ease=Math.max(EASE_MIN,card.ease-0.2);
    card.interval=1; card.due=addDays(1);
    return {lapsed:true};
  }
  // 正解。定着回数は「日をまたぎ、かつ今日まだ失敗していない」ときだけ加算（詰め込み除外）
  const spaced=(card.last==null||card.last<t) && card.dayFail!==t;
  let grad=false;
  if(spaced){
    card.succ++; card.last=t; card.reps++;
    if(q==="hard")card.ease=Math.max(EASE_MIN,card.ease-0.15);
    let iv = card.succ<=STEP.length ? STEP[card.succ-1] : Math.round(Math.max(card.interval,1)*(q==="hard"?1.3:card.ease));
    card.interval=Math.min(iv,MAXIV); card.due=addDays(card.interval);
    if(card.succ===CRITERION)grad=true;
  }else{
    // 同日の再正解：定着には数えず、近日中に再出題
    card.interval=1; card.due=addDays(1);
  }
  return {grad};
}

function nextCard(){st.pos++;st.flipped=false;st.options=null;st.answered=null;st.correct=null;render();}
function grade(q){
  const cur=currentCard();if(!cur)return;
  const r=applyGrade(cur,q); save();
  if(q==="again")st.stats.again++; else st.stats.good++;
  if(r&&r.grad)st.stats.grad++;
  if(q==="again")st.queue.push(cur.id); // 同セッション中にもう一度
  nextCard();
}
function answerChoice(text){
  const cur=currentCard();if(!cur||st.answered!=null)return;
  st.answered=text;st.correct=(text===cur.back);
  const r=applyGrade(cur, st.correct?"good":"again"); save();
  if(st.correct)st.stats.good++; else {st.stats.again++; st.queue.push(cur.id);}
  if(r&&r.grad)st.stats.grad++;
  render();
}
function setMode(m){st.mode=m;try{localStorage.setItem("enekan_mode",m);}catch(e){}render();}

/* ---------- カード編集 / 設定操作 ---------- */
function saveCard(){
  const topic=document.getElementById("f_topic").value.trim();
  const front=document.getElementById("f_front").value.trim();
  const back=document.getElementById("f_back").value.trim();
  if(!front||!back)return;
  const ed=st.editing;
  if(ed&&ed.id&&deck.some(c=>c.id===ed.id)) deck=deck.map(c=>c.id===ed.id?{...c,subject:st.editSub,topic,front,back}:c);
  else deck.push(freshCard(["U-"+Date.now().toString(36),st.editSub,topic,front,back]));
  save();st.editing=null;st.view="browse";render();
}
function deleteCard(id){deck=deck.filter(c=>c.id!==id);save();render();}
function replenish(){const have=new Set(deck.map(c=>c.id));const add=seedDeck().filter(c=>!have.has(c.id));if(add.length){deck=deck.concat(add);save();}render();}
function resetProgress(){deck=deck.map(c=>freshCard([c.id,c.subject,c.topic,c.front,c.back]));save();render();}
function restoreDefault(){deck=seedDeck();save();render();}
function setNew(delta){meta.newPerDay=Math.max(0,Math.min(100,meta.newPerDay+delta));saveMeta();render();}
function exportJSON(){
  const blob=new Blob([JSON.stringify(deck,null,1)],{type:"application/json"});
  const url=URL.createObjectURL(blob);const a=document.createElement("a");
  a.href=url;a.download="enekan_deck_"+today()+".json";document.body.appendChild(a);a.click();
  setTimeout(()=>{URL.revokeObjectURL(url);a.remove();},500);
}
function importJSON(input){
  const file=input.files&&input.files[0];if(!file)return;
  const fr=new FileReader();
  fr.onload=()=>{try{const data=JSON.parse(fr.result);
    if(Array.isArray(data)&&data.every(c=>c.id&&c.front&&c.back)){deck=data.map(migrate);save();st.view="home";render();}
    else alert("形式が違うファイルです。");
  }catch(e){alert("読み込めませんでした。");}};
  fr.readAsText(file);
}

/* ====================================================================
   描画
   ==================================================================== */
const esc=(s)=>String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const chip=(s)=>{const m=SUBJECTS[s];return `<span class="chip" style="background:${m.soft};color:${m.color};border:1px solid ${m.color}33">${m.label}</span>`;};
function meter(c){
  const dots=[0,1,2].map(i=>`<span class="mdot ${i<c.succ?"on":""}"></span>`).join("");
  return `<span class="meter">${dots}</span>`;
}
function statusChip(c){
  const s=statusOf(c);
  if(s==="done")return `<span class="stat" style="background:#e8f6ee;color:var(--good)">定着</span>`;
  if(s==="new") return `<span class="stat" style="background:#eef1f4;color:#7a8794">新規</span>`;
  const m=SUBJECTS[c.subject];
  return `<span class="stat" style="background:${m.soft};color:${m.color}">学習中</span>`;
}

function render(){
  const app=document.getElementById("app");let body="";
  if(st.view==="home")body=viewHome();
  else if(st.view==="review")body=currentCard()?viewReview():viewDone();
  else if(st.view==="browse")body=viewBrowse();
  else if(st.view==="edit")body=viewEdit();
  else if(st.view==="settings")body=viewSettings();
  app.innerHTML=header()+body;bind();
}
function header(){
  const b=st.view!=="home";
  return `<div class="hd">
    ${b?`<button class="back" data-act="home">‹</button>`:""}
    <div class="logo">⚡</div>
    <div><div class="title">エネ管 暗記デッキ</div><div class="sub">間隔反復・定着まで自動再出題</div></div>
    <div class="save-dot" style="color:${saveOK?"#5a8f6b":"#b06"}"><span class="dot" style="background:${saveOK?"var(--good)":"var(--again)"}"></span>${saveOK?"保存中":"未保存"}</div>
  </div>`;
}

function viewHome(){
  const {c,total,done,due,newAvail}=counts();
  const newPlan=Math.min(newRemaining(),newAvail);
  const todayTotal=due+newPlan;
  const pct=total?Math.round(done/total*100):0;
  const cards=ORDER.map(s=>{
    const m=SUBJECTS[s],b=c[s];const p=b.total?Math.round(b.done/b.total*100):0;
    const todays=b.due+Math.min(newRemaining(),b.newAvail);
    return `<div class="scard" style="border-top:3px solid ${m.color}">
      ${chip(s)}<div class="sname">${m.name}</div>
      <div style="font-size:12px;color:#5b6877">定着 <b style="color:var(--good);font-size:16px">${b.done}</b> / ${b.total}</div>
      <div class="obar2"><div style="width:${p}%"></div></div>
      <div style="font-size:11.5px;color:#8a96a3;margin-bottom:8px">今日 ${todays} 枚（復習${b.due}＋新規${Math.min(newRemaining(),b.newAvail)}）</div>
      <div class="row">
        <button class="smbtn" style="flex:1;background:${todays?m.color:"#eef1f4"};color:${todays?"#fff":"#aab4bf"}" data-act="daily" data-s="${s}" ${todays?"":"disabled"}>学習</button>
        <button class="smbtn" style="background:${m.soft};color:${m.color}" data-act="drill" data-s="${s}" title="全部追い込み（進捗は変えない）">↻</button>
      </div></div>`;
  }).join("");
  return `<div class="hero">
    <div class="lab">今日の学習</div>
    <div class="num">${todayTotal}</div>
    <div class="split"><span class="it">復習 <b>${due}</b></span><span class="it">新規 <b>${newPlan}</b></span></div>
    ${todayTotal>0
      ? `<button class="btn btn-light" data-act="daily" data-s="all">学習を始める</button>`
      : `<div style="font-size:13.5px;opacity:.92">✓ 今日の予定は完了。明日また最適なタイミングで再出題される。</div>`}
  </div>
  <div class="overall">
    <div class="t">全体の定着 <b>${done}</b> / ${total} 枚（${pct}%）</div>
    <div class="obar"><div style="width:${pct}%"></div></div>
  </div>
  <div class="modeseg">
    <button class="modebtn ${st.mode==='choice'?'on':''}" data-act="mode" data-m="choice">4択で覚える</button>
    <button class="modebtn ${st.mode==='flip'?'on':''}" data-act="mode" data-m="flip">めくって思い出す</button>
  </div>
  <div class="grid">${cards}</div>
  <div class="footbtns">
    <button class="rowbtn" data-act="browse">☰ カード一覧・追加</button>
    <button class="rowbtn" style="flex:0 0 auto;width:52px" data-act="settings">⚙</button>
  </div>`;
}

function viewReview(){
  const card=currentCard();const m=SUBJECTS[card.subject];
  const remaining=st.queue.length-st.pos;
  const prog=st.queue.length?Math.round(st.pos/st.queue.length*100):0;
  const meta1=`<div class="revmeta">
      <span>残り ${remaining} 枚</span>
      ${st.drill?`<span style="color:${m.color};font-weight:700">追い込み（進捗そのまま）</span>`:""}
      <span style="margin-left:auto">✕${st.stats.again} ○${st.stats.good}${st.stats.grad?` ★${st.stats.grad}`:""}</span>
    </div><div class="barwrap" style="margin-bottom:14px"><div class="bar" style="width:${prog}%;background:${m.color}"></div></div>`;
  const head=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:14px">
      ${chip(card.subject)}<span style="font-size:11.5px;color:#8a96a3">${esc(card.topic)}</span>
      <span style="margin-left:auto;display:flex;align-items:center;gap:6px">${statusChip(card)}${meter(card)}</span></div>`;

  if(st.mode==="choice"){
    if(!st.options)st.options=makeOptions(card);
    const answered=st.answered!=null;
    const opts=st.options.map(t=>{let cls="opt";
      if(answered){if(t===card.back)cls+=" correct";else if(t===st.answered)cls+=" wrong";else cls+=" dim";}
      return `<button class="${cls}" data-act="choose" data-t="${esc(t)}" ${answered?"disabled":""}>${esc(t)}</button>`;}).join("");
    return meta1+`
      <div class="qcard" style="border-top:4px solid ${m.color}">${head}<div class="qtext">${esc(card.front)}</div></div>
      <div class="opts">${opts}</div>
      ${answered?`<div class="result">
        <span style="color:${st.correct?"var(--good)":"var(--again)"};font-weight:800;font-size:16px">${st.correct?"○ 正解":"✕ 不正解"}</span>
        ${st.correct?"":`<div style="color:#54616e;font-size:14px;margin-top:6px;line-height:1.6">答え：${esc(card.back)}</div>`}
        <button class="btn btn-navy" style="margin-top:14px" data-act="next">次へ ›</button>
      </div>`:""}`;
  }
  return meta1+`
    <button class="face" style="border-top:4px solid ${m.color}" data-act="flip">${head}
      <div class="qtext">${esc(card.front)}</div>
      ${st.flipped?`<div class="ans"><div class="l" style="color:${m.color}">こたえ</div><div class="t">${esc(card.back)}</div></div>`:`<div class="hint">タップで答えを表示</div>`}
    </button>
    ${st.flipped?`<div class="grades">
      <button class="gbtn" style="border-color:var(--again);color:var(--again)" data-act="grade" data-k="again"><span class="ic">✕</span><span class="lb">わからない</span><span class="sb">明日また</span></button>
      <button class="gbtn" style="border-color:var(--hard);color:var(--hard)" data-act="grade" data-k="hard"><span class="ic">△</span><span class="lb">あいまい</span><span class="sb">正解(短め)</span></button>
      <button class="gbtn" style="border-color:var(--good);color:var(--good)" data-act="grade" data-k="good"><span class="ic">○</span><span class="lb">思い出せた</span><span class="sb">間隔をのばす</span></button>
    </div>`:""}`;
}

function viewDone(){
  const s=st.stats;const {due,newAvail}=counts();const more=due+Math.min(newRemaining(),newAvail);
  return `<div class="done">
    <div class="circle">✓</div>
    <div style="font-size:19px;font-weight:800;margin-bottom:6px">セッション完了</div>
    <div style="font-size:13.5px;color:#5b6877;margin-bottom:4px">○${s.good} ✕${s.again}${s.grad?` ・ 今回 ★${s.grad}枚が定着`:""}</div>
    ${st.drill?`<div style="font-size:12px;color:#9aa6b2;margin-bottom:14px">追い込みモードのため進捗は変えていない</div>`:`<div style="font-size:12px;color:#9aa6b2;margin-bottom:14px">間隔をあけてまた出題される</div>`}
    <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap">
      ${(!st.drill&&more>0)?`<button class="btn btn-navy" style="width:auto;padding:11px 18px" data-act="daily" data-s="all">続けて ${more} 枚</button>`:""}
      <button class="btn btn-soft" style="width:auto;padding:11px 18px" data-act="home">ホームへ</button>
    </div></div>`;
}

function viewBrowse(){
  const cnt=ORDER.map(s=>deck.filter(c=>c.subject===s).length);
  const filters=`<button class="fchip" data-act="filter" data-s="all" style="${st.filterSub==="all"?`background:var(--navy);color:#fff;border-color:var(--navy)`:""}">すべて (${deck.length})</button>`+
    ORDER.map((s,i)=>`<button class="fchip" data-act="filter" data-s="${s}" style="${st.filterSub===s?`background:${SUBJECTS[s].color};color:#fff;border-color:${SUBJECTS[s].color}`:""}">${SUBJECTS[s].label} (${cnt[i]})</button>`).join("");
  return `<div style="display:flex;gap:8px;margin-bottom:10px">
      <div class="searchbar">🔍<input id="searchbox" placeholder="検索（問い・答え・分野）" value="${esc(st.search)}"></div>
      <button class="btn btn-navy" style="width:auto;padding:0 14px;gap:6px" data-act="add">＋ 追加</button>
    </div><div class="filters">${filters}</div><div class="clist" id="clist">${listHTML()}</div>`;
}
function listHTML(){
  const q=st.search.trim();
  const rows=deck.filter(c=>{if(st.filterSub!=="all"&&c.subject!==st.filterSub)return false;if(q)return (c.front+c.back+c.topic).includes(q);return true;});
  if(!rows.length)return `<div style="text-align:center;color:#9aa6b2;padding:30px;font-size:13px">該当なし</div>`;
  return rows.map(c=>{const m=SUBJECTS[c.subject];return `<div class="crow" style="border-left:4px solid ${m.color}">
    <div class="top">${chip(c.subject)}<span class="topic">${esc(c.topic)}</span>
      <span style="margin-left:auto;display:flex;align-items:center;gap:6px">${statusChip(c)}${meter(c)}</span>
      <button class="miniic" data-act="edit" data-id="${c.id}">✎</button>
      <button class="miniic" data-act="del" data-id="${c.id}" style="color:#c0676a">🗑</button>
    </div><div class="q">${esc(c.front)}</div><div class="a">${esc(c.back)}</div></div>`;}).join("");
}

function viewEdit(){
  const ed=st.editing||{};
  const subBtns=ORDER.map(s=>{const m=SUBJECTS[s];const on=st.editSub===s;
    return `<button class="subbtn" data-act="editsub" data-s="${s}" style="${on?`border-color:${m.color};background:${m.soft};color:${m.color}`:""}">${m.label}</button>`;}).join("");
  return `<div class="panel">
    <div style="font-weight:800;font-size:16px;margin-bottom:14px">${ed.id?"カードを編集":"カードを追加"}</div>
    <label class="lbl">課目</label><div class="subbtns" id="subbtns">${subBtns}</div>
    <label class="lbl">分野（任意）</label><input class="inp" id="f_topic" value="${esc(ed.topic||"")}" placeholder="例: 変圧器">
    <label class="lbl">問い（おもて）</label><textarea class="ta" id="f_front" rows="2">${esc(ed.front||"")}</textarea>
    <label class="lbl">答え（うら）</label><textarea class="ta" id="f_back" rows="3">${esc(ed.back||"")}</textarea>
    <div style="display:flex;gap:8px;margin-top:6px">
      <button class="btn btn-soft" data-act="browse">キャンセル</button>
      <button class="btn btn-navy" data-act="savecard">保存</button>
    </div></div>`;
}

function viewSettings(){
  const cf=st.confirm;
  return `<div class="stack">
    <div class="note">
      <h4>この教材の仕組み（エビデンス）</h4>
      <ul>
        <li><b>定着＝日をまたいだ自力正解 3回</b>。検索練習研究で、間隔をあけた成功想起は約3回で効果が頭打ちになる（Karpicke &amp; Roediger 2008 / Rawson &amp; Dunlosky 2011）。</li>
        <li>正解するたび次回が <b>1→4→9日</b> と先になり、忘れる直前に再出題（間隔反復）。定着後も最大${MAXIV}日でときどき確認。</li>
        <li><b>同じ日に解き直しても定着回数には数えない</b>（詰め込み除外）。間隔をあけた想起だけを数える。</li>
        <li>✕で1回戻る。だから「やって終わり」にならず、3回安定して言えるまで何度でも出る。</li>
        <li>「4択→めくり」は recognition→recall の橋渡し。最終的にめくり（自力想起）で詰めると強い。</li>
      </ul>
    </div>
    <div class="setrow"><div class="ic">🆕</div><div style="flex:1"><div class="ti">1日の新規カード上限</div><div class="de">一度に出す新顔の数。多すぎる復習を防ぐ（既定 ${DEFAULT_NEW}）</div></div>
      <div class="numctl"><button class="numbtn" data-act="numdec">−</button><span class="numval">${meta.newPerDay}</span><button class="numbtn" data-act="numinc">＋</button></div></div>
    <div class="setrow"><div class="ic">⤓</div><div style="flex:1"><div class="ti">バックアップを書き出す</div><div class="de">カード＋進捗をJSONで保存（別端末への移行・保険）</div></div><button class="btn btn-navy" style="width:auto;padding:8px 14px" data-act="export">書き出す</button></div>
    <div class="setrow"><div class="ic">⤒</div><div style="flex:1"><div class="ti">バックアップを読み込む</div><div class="de">JSONを取り込む（現在の内容は置き換わる）</div></div>
      <label class="btn btn-soft" style="width:auto;padding:8px 14px;cursor:pointer">読み込む<input type="file" id="importfile" accept="application/json,.json" style="display:none"></label></div>
    <div class="setrow"><div class="ic">＋</div><div style="flex:1"><div class="ti">不足カードを補充</div><div class="de">初期カードのうち今ない分だけ追加（自作は消えない）</div></div><button class="btn btn-navy" style="width:auto;padding:8px 14px" data-act="replenish">補充</button></div>
    <div class="setrow"><div class="ic" style="color:var(--hard)">↻</div><div style="flex:1"><div class="ti">学習進捗をリセット</div><div class="de">カードは残し、定着回数・間隔を最初に戻す（新方式で仕切り直し）</div></div><button class="btn" style="width:auto;padding:8px 14px;background:var(--hard);color:#fff" data-act="confirm" data-c="progress">リセット</button></div>
    <div class="setrow"><div class="ic" style="color:var(--again)">⚠</div><div style="flex:1"><div class="ti">初期状態に戻す</div><div class="de">自作カード・全進捗を消し初期150枚に戻す</div></div><button class="btn" style="width:auto;padding:8px 14px;background:var(--again);color:#fff" data-act="confirm" data-c="restore">戻す</button></div>
    ${cf?`<div style="background:#fff;border:1px solid #cf4b4655;border-radius:12px;padding:14px">
      <div style="font-size:13.5px;margin-bottom:10px">${cf==="progress"?"学習の進捗（定着回数・間隔）を全部リセットします。カードは残ります。よろしいですか？":"自作カードと進捗をすべて消し、初期状態に戻します。よろしいですか？"}</div>
      <div style="display:flex;gap:8px">
        <button class="smbtn" style="flex:1;background:#eef1f4;color:#5b6877" data-act="cancelconfirm">やめる</button>
        <button class="smbtn" style="flex:1;background:var(--again);color:#fff" data-act="doconfirm">実行する</button>
      </div></div>`:""}
  </div>`;
}

/* ---------- 結線 ---------- */
function bind(){
  document.querySelectorAll("[data-act]").forEach(el=>{
    el.onclick=()=>{const a=el.dataset.act;
      if(a==="home"){st.view="home";st.editing=null;st.confirm=null;render();}
      else if(a==="daily"){startDaily(el.dataset.s);}
      else if(a==="drill"){startDrill(el.dataset.s);}
      else if(a==="flip"){st.flipped=!st.flipped;render();}
      else if(a==="grade"){grade(el.dataset.k);}
      else if(a==="choose"){answerChoice(el.dataset.t);}
      else if(a==="next"){nextCard();}
      else if(a==="mode"){setMode(el.dataset.m);}
      else if(a==="browse"){st.view="browse";st.editing=null;render();}
      else if(a==="settings"){st.view="settings";st.confirm=null;render();}
      else if(a==="filter"){st.filterSub=el.dataset.s;render();}
      else if(a==="add"){st.editing={};st.editSub="I";st.view="edit";render();}
      else if(a==="edit"){const c=deck.find(x=>x.id===el.dataset.id);st.editing={...c};st.editSub=c.subject;st.view="edit";render();}
      else if(a==="del"){deleteCard(el.dataset.id);}
      else if(a==="editsub"){st.editSub=el.dataset.s;
        document.querySelectorAll("#subbtns .subbtn").forEach(b=>{const s=b.dataset.s,m=SUBJECTS[s],on=s===st.editSub;
          b.style.cssText=on?`border-color:${m.color};background:${m.soft};color:${m.color}`:"";});}
      else if(a==="savecard"){saveCard();}
      else if(a==="export"){exportJSON();}
      else if(a==="replenish"){replenish();}
      else if(a==="numdec"){setNew(-5);}
      else if(a==="numinc"){setNew(5);}
      else if(a==="confirm"){st.confirm=el.dataset.c;render();}
      else if(a==="cancelconfirm"){st.confirm=null;render();}
      else if(a==="doconfirm"){if(st.confirm==="progress")resetProgress();else restoreDefault();st.confirm=null;render();}
    };
  });
  const sb=document.getElementById("searchbox");
  if(sb)sb.oninput=()=>{st.search=sb.value;document.getElementById("clist").innerHTML=listHTML();bindList();};
  const imp=document.getElementById("importfile");
  if(imp)imp.onchange=()=>importJSON(imp);
  bindList();
}
function bindList(){
  document.querySelectorAll("#clist [data-act]").forEach(el=>{
    el.onclick=()=>{const a=el.dataset.act;
      if(a==="edit"){const c=deck.find(x=>x.id===el.dataset.id);st.editing={...c};st.editSub=c.subject;st.view="edit";render();}
      else if(a==="del"){deleteCard(el.dataset.id);}};
  });
}

try{ render(); }catch(err){
  var a=document.getElementById('app');
  if(a) a.innerHTML='<div style="max-width:680px;margin:24px auto;padding:18px;border:1px solid #e6c9c9;background:#fff;border-radius:12px;font-family:-apple-system,sans-serif;color:#1f2d3d;line-height:1.7">'
    +'<div style="font-weight:800;color:#cf4b46">表示エラー</div><div style="font-size:13px;white-space:pre-wrap;background:#f7f7f5;padding:8px;border-radius:8px;margin:8px 0">'+(err&&err.message?err.message:err)+'</div>'
    +'<div style="font-size:12px;color:#888">データは端末内に残っています。バックアップ（書き出し）したJSONがあれば復元できます。</div></div>';
  throw err;
}
if("serviceWorker" in navigator && location.protocol==="https:"){navigator.serviceWorker.register("./sw.js").catch(()=>{});}
</script>
</body>
</html>
